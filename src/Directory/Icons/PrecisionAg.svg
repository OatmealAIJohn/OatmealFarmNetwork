<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bgGrad" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#D4B98A"/>
      <stop offset="100%" stop-color="#B08C5E"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="32" ry="32" fill="#C4A882"/>
  <rect width="200" height="200" rx="32" ry="32" fill="url(#bgGrad)" opacity="0.4"/>

  <!-- ===== CROP ROWS at bottom ===== -->
  <ellipse cx="100" cy="185" rx="78" ry="10" fill="#8B5E3C" opacity="0.6"/>
  <path d="M 28,178 Q 100,167 172,178" fill="none" stroke="#7A9A48" stroke-width="4" stroke-linecap="round"/>
  <path d="M 36,169 Q 100,159 164,169" fill="none" stroke="#6B8A3E" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 46,161 Q 100,152 154,161" fill="none" stroke="#7A9A48" stroke-width="3" stroke-linecap="round"/>

  <!-- Wheat tufts -->
  <g fill="#C8A44A">
    <ellipse cx="50" cy="175" rx="5" ry="8"/>
    <ellipse cx="76" cy="169" rx="5" ry="8"/>
    <ellipse cx="100" cy="166" rx="5" ry="8"/>
    <ellipse cx="124" cy="169" rx="5" ry="8"/>
    <ellipse cx="150" cy="175" rx="5" ry="8"/>
  </g>

  <!-- ===== SIGNAL ARCS ===== -->
  <g opacity="0.6" stroke="#C4A040" fill="none" stroke-linecap="round">
    <path d="M 118,118 Q 128,138 118,158" stroke-width="1.8"/>
    <path d="M 124,115 Q 142,138 130,160" stroke-width="1.4" opacity="0.75"/>
    <path d="M 130,113 Q 156,138 142,162" stroke-width="1.1" opacity="0.5"/>
  </g>
  <!-- Target crosshair on field -->
  <circle cx="122" cy="160" r="6" fill="none" stroke="#C4A040" stroke-width="1.8" opacity="0.8"/>
  <circle cx="122" cy="160" r="2.5" fill="#C4A040" opacity="0.9"/>

  <!-- ===== BIG SATELLITE ===== -->
  <g transform="translate(96, 82) rotate(-25)">

    <!-- Left solar panel -->
    <rect x="-95" y="-16" width="60" height="32" rx="5" fill="#5C6B9A"/>
    <line x1="-83" y1="-16" x2="-83" y2="16" stroke="#4A5880" stroke-width="1.3"/>
    <line x1="-69" y1="-16" x2="-69" y2="16" stroke="#4A5880" stroke-width="1.3"/>
    <line x1="-55" y1="-16" x2="-55" y2="16" stroke="#4A5880" stroke-width="1.3"/>
    <line x1="-95" y1="0" x2="-35" y2="0" stroke="#4A5880" stroke-width="1.3"/>
    <rect x="-94" y="-15" width="58" height="14" rx="3" fill="#7A8EC0" opacity="0.25"/>
    <!-- arm -->
    <rect x="-37" y="-6" width="9" height="12" rx="2" fill="#7A8A58"/>

    <!-- Right solar panel -->
    <rect x="35" y="-16" width="60" height="32" rx="5" fill="#5C6B9A"/>
    <line x1="49" y1="-16" x2="49" y2="16" stroke="#4A5880" stroke-width="1.3"/>
    <line x1="63" y1="-16" x2="63" y2="16" stroke="#4A5880" stroke-width="1.3"/>
    <line x1="77" y1="-16" x2="77" y2="16" stroke="#4A5880" stroke-width="1.3"/>
    <line x1="35" y1="0" x2="95" y2="0" stroke="#4A5880" stroke-width="1.3"/>
    <rect x="36" y="-15" width="58" height="14" rx="3" fill="#7A8EC0" opacity="0.25"/>
    <!-- arm -->
    <rect x="28" y="-6" width="9" height="12" rx="2" fill="#7A8A58"/>

    <!-- Main body -->
    <rect x="-28" y="-22" width="56" height="44" rx="7" fill="#8A9E6E"/>
    <line x1="-10" y1="-22" x2="-10" y2="22" stroke="#6B7D50" stroke-width="1.3"/>
    <line x1="10" y1="-22" x2="10" y2="22" stroke="#6B7D50" stroke-width="1.3"/>
    <!-- sensor windows -->
    <rect x="-24" y="-16" width="11" height="9" rx="2" fill="#A8C4D0" opacity="0.85"/>
    <rect x="-24" y="7" width="11" height="9" rx="2" fill="#A8C4D0" opacity="0.85"/>
    <rect x="13" y="-16" width="11" height="9" rx="2" fill="#A8C4D0" opacity="0.85"/>
    <rect x="13" y="7" width="11" height="9" rx="2" fill="#A8C4D0" opacity="0.85"/>

    <!-- Dish antenna arm -->
    <rect x="-4" y="-38" width="6" height="18" rx="2" fill="#9A8040"/>
    <!-- Dish bowl -->
    <path d="M -22,-56 Q -1,-72 20,-56 Q 12,-40 -1,-38 Q -13,-40 -22,-56 Z" fill="#C4A850"/>
    <ellipse cx="-1" cy="-38" rx="5" ry="5" fill="#D4B840"/>
    <path d="M -22,-56 Q -1,-72 20,-56" fill="none" stroke="#B09030" stroke-width="1.8" stroke-linecap="round"/>
  </g>
</svg>
